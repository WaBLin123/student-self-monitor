<!doctype html>
<html lang="zh-TW">
  <head>
    <meta charset="UTF-8" />
    <title>自我監控表</title>

    <style>
      body {
        font-family: "Microsoft JhengHei";
        text-align: center;
        background: #f5f7fa;
      }
      .top-bar {
        display: grid;
        grid-template-columns: 1fr auto 1fr;
        align-items: center;
        width: 95%;
        margin: 20px auto 0;
      }
      .top-bar h2 {
        margin: 0;
      }
      .top-actions {
        justify-self: end;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .top-filters {
        justify-self: start;
      }

      table {
        border-collapse: collapse;
        margin: 20px auto;
        width: 95%;
      }
      td,
      th {
        border: 1px solid #ccc;
        padding: 10px;
        font-size: 13px;
      }

      th {
        background: #333;
        color: white;
      }

      .normal {
        background: #e8f5e9;
      } /* 綠 */
      .pullout {
        background: #fff3cd;
      } /* 黃 */
      .warning {
        background: #f8d7da;
      } /* 紅 */

      button {
        padding: 5px;
        margin: 2px;
        border: none;
        border-radius: 5px;
        cursor: pointer;
      }
      .in {
        background: #4caf50;
        color: white;
      }
      .out {
        background: #f44336;
        color: white;
      }
      .med {
        background: #1976d2;
        color: white;
      }
      .export {
        background: #6f42c1;
        color: white;
        padding: 8px 12px;
      }
      .export:disabled {
        background: #b8a9d6;
        cursor: not-allowed;
      }
      .view-btn {
        background: #9aa0a6;
        color: white;
        padding: 8px 12px;
      }
      .view-btn.active {
        background: #0d6efd;
      }
      .key-btn {
        background: #5c6bc0;
        color: white;
        padding: 8px 12px;
      }
      .sync {
        background: #009688;
        color: white;
        padding: 8px 12px;
      }
      .sync:disabled {
        background: #95c8c2;
        cursor: not-allowed;
      }
      .sync-status {
        display: inline-flex;
        align-items: center;
        justify-content: flex-end;
        gap: 6px;
        font-size: 13px;
        color: #333;
        min-width: 92px;
        text-align: right;
      }
      .sync-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #9e9e9e;
      }
      .sync-status.success .sync-dot {
        background: #2e7d32;
      }
      .sync-status.error .sync-dot {
        background: #d32f2f;
      }
      .sync-status.loading .sync-dot {
        background: #f9a825;
      }

      select {
        width: 90%;
      }

      .time-box {
        white-space: pre-line;
        font-size: 12px;
      }
      .time-actions {
        display: flex;
        justify-content: space-between;
        align-items: center;
        text-align: center;
        gap: 6px;
        margin-top: 6px;
      }
      .time-actions button {
        flex: 1;
      }
    </style>
  </head>

  <body>
    <div class="top-bar">
      <div class="top-filters">
        <button id="btnToday" class="view-btn" onclick="setViewMode('today')">
          當天
        </button>
        <button
          id="btnWeek"
          class="view-btn active"
          onclick="setViewMode('week')"
        >
          當週
        </button>
        <button class="key-btn" onclick="setGoogleSheetApiKey()">
          設定 API Key
        </button>
      </div>
      <h2>📊 一週課表（視覺化＋時間）</h2>
      <div class="top-actions">
        <div id="syncStatus" class="sync-status">
          <span class="sync-dot"></span>
          <span id="syncStatusText">未同步</span>
        </div>
        <button id="btnSync" class="sync" onclick="syncToGoogleSheet()">
          同步 Google Sheet
        </button>
        <button id="btnExport" class="export" onclick="exportTableData()">
          匯出資料
        </button>
      </div>
    </div>

    <table id="table"></table>

    <script>
      const days = ["週一", "週二", "週三", "週四", "週五"];

      const schedule = [
        ["早自習", "打卡"],
        ["第一節", "學習"],
        ["下課", "打卡"],
        ["第二節", "學習"],
        ["下課", "打卡"],
        ["第三節", "學習"],
        ["下課", "打卡"],
        ["第四節", "學習"],
        ["午餐/午休", "打卡"],
        ["第五節", "學習"],
        ["下課", "打卡"],
        ["第六節", "學習"],
        ["掃地", "打卡"],
        ["第七節", "學習"],
      ];

      // ⭐抽離節次
      const selfPeriods = [
        "週一_第四節",
        "週一_第七節",
        "週三_第五節",
        "週三_第六節",
        "週三_第七節",
        "週四_第一節",
        "週四_第三節",
        "週四_第七節",
        "週五_第六節",
      ];

      let records = {};
      const STORAGE_KEY = "studentSelfMonitorState_v1";
      const VIEW_MODE_KEY = "studentSelfMonitorViewMode_v1";
      const GOOGLE_SHEET_API_KEY_STORAGE_KEY =
        "studentSelfMonitorGoogleApiKey_v1";
      let GOOGLE_SHEET_API_KEY = "YOUR_SIMPLE_KEY";
      const GOOGLE_SHEET_WEB_APP_URL =
        "https://script.google.com/macros/s/AKfycbzJ-D_QPz-XOA8cNiGzGi_uU-IsUkWiriSsfHk2uMoG_7-yu3yrt3iM9KG_nYqi-tC5/exec";
      const AUTO_SYNC_DELAY_MS = 3000;
      let currentViewMode = "week";
      let autoSyncTimerId = null;
      let isSyncInProgress = false;
      let pendingSyncAfterCurrent = false;

      // ⭐時間
      function getNow() {
        return new Date();
      }

      function now() {
        return getNow().toLocaleTimeString();
      }

      function saveToLocalStorage() {
        let state = getStoredState();
        let checks = state.checks || {};
        let activities = state.activities || {};

        for (let i = 0; i < schedule.length; i++) {
          let period = schedule[i][0];

          for (let j = 0; j < days.length; j++) {
            let day = days[j];
            let key = day + "_" + period;
            let id = "c" + i + j;

            if (selfPeriods.includes(key)) {
              let selectEl = document.getElementById("s" + i + j);
              activities["s" + i + j] = selectEl ? selectEl.value : "";
            } else {
              let c1 = document.getElementById(id + "_1");
              let c2 = document.getElementById(id + "_2");
              let c3 = document.getElementById(id + "_3");
              if (c1 && c2 && c3) {
                checks[id] = {
                  c1: c1.checked,
                  c2: c2.checked,
                  c3: c3.checked,
                };
              }
            }
          }
        }

        state = { records, checks, activities };
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
      }

      function getStoredState() {
        let raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return { records: {}, checks: {}, activities: {} };
        try {
          return JSON.parse(raw);
        } catch (e) {
          return { records: {}, checks: {}, activities: {} };
        }
      }

      function getTodayLabel() {
        const dayMap = ["週日", "週一", "週二", "週三", "週四", "週五", "週六"];
        return dayMap[getNow().getDay()];
      }

      function getDateTextForDay(dayLabel) {
        const today = getNow();
        const todayJsDay = today.getDay();
        const mondayOffset = todayJsDay === 0 ? -6 : 1 - todayJsDay;
        const monday = new Date(today);
        monday.setHours(0, 0, 0, 0);
        monday.setDate(today.getDate() + mondayOffset);

        const dayIndex = days.indexOf(dayLabel);
        const target = new Date(monday);
        target.setDate(monday.getDate() + dayIndex);

        const month = target.getMonth() + 1;
        const date = target.getDate();
        return `${month}/${date}`;
      }

      function getDayHeaderText(dayLabel) {
        return `${dayLabel} ${getDateTextForDay(dayLabel)}`;
      }

      function getWeekStartKey() {
        const today = getNow();
        const todayJsDay = today.getDay();
        const mondayOffset = todayJsDay === 0 ? -6 : 1 - todayJsDay;
        const monday = new Date(today);
        monday.setHours(0, 0, 0, 0);
        monday.setDate(today.getDate() + mondayOffset);
        const yyyy = monday.getFullYear();
        const mm = String(monday.getMonth() + 1).padStart(2, "0");
        const dd = String(monday.getDate()).padStart(2, "0");
        return `${yyyy}-${mm}-${dd}`;
      }

      function getVisibleDays() {
        if (currentViewMode === "today") {
          const today = getTodayLabel();
          return days.includes(today) ? [today] : [];
        }
        return days;
      }

      function updateViewButtons() {
        const isToday = currentViewMode === "today";
        document.getElementById("btnToday").classList.toggle("active", isToday);
        document.getElementById("btnWeek").classList.toggle("active", !isToday);
      }

      function setViewMode(mode) {
        currentViewMode = mode;
        localStorage.setItem(VIEW_MODE_KEY, mode);
        renderTable();
      }

      function setGoogleSheetApiKey() {
        const input = prompt(
          "請輸入 GOOGLE_SHEET_API_KEY",
          GOOGLE_SHEET_API_KEY || "",
        );
        if (input === null) return;
        GOOGLE_SHEET_API_KEY = input.trim();
        localStorage.setItem(
          GOOGLE_SHEET_API_KEY_STORAGE_KEY,
          GOOGLE_SHEET_API_KEY,
        );
        alert("API Key 已更新");
      }

      function hasNoClassToday() {
        return currentViewMode === "today" && getVisibleDays().length === 0;
      }

      function updateExportButtonState() {
        const exportBtn = document.getElementById("btnExport");
        if (!exportBtn) return;
        exportBtn.disabled = hasNoClassToday();
      }

      function updateSyncButtonState() {
        const syncBtn = document.getElementById("btnSync");
        if (!syncBtn) return;
        syncBtn.disabled = hasNoClassToday();
      }

      function setSyncStatus(status, text) {
        const statusEl = document.getElementById("syncStatus");
        const textEl = document.getElementById("syncStatusText");
        if (!statusEl || !textEl) return;
        statusEl.classList.remove("success", "error", "loading");
        if (status) statusEl.classList.add(status);
        textEl.innerText = text;
      }

      function scheduleAutoSync() {
        if (hasNoClassToday()) return;
        if (autoSyncTimerId) {
          clearTimeout(autoSyncTimerId);
        }
        setSyncStatus("loading", "等待同步");
        autoSyncTimerId = setTimeout(() => {
          autoSyncTimerId = null;
          syncToGoogleSheet({ silent: true });
        }, AUTO_SYNC_DELAY_MS);
      }

      function loadFromLocalStorage() {
        let raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return;

        try {
          let state = JSON.parse(raw);
          records = state.records || {};

          for (let i = 0; i < schedule.length; i++) {
            let period = schedule[i][0];

            for (let j = 0; j < days.length; j++) {
              let day = days[j];
              let key = day + "_" + period;
              let id = "c" + i + j;

              if (selfPeriods.includes(key)) {
                let selectId = "s" + i + j;
                let selectEl = document.getElementById(selectId);
                if (
                  selectEl &&
                  state.activities &&
                  typeof state.activities[selectId] === "string"
                ) {
                  selectEl.value = state.activities[selectId];
                  if (selectEl.value) {
                    selectEl.parentElement.classList.add("pullout");
                  }
                }
              } else {
                let c1 = document.getElementById(id + "_1");
                let c2 = document.getElementById(id + "_2");
                let c3 = document.getElementById(id + "_3");
                if (c1 && c2 && c3 && state.checks && state.checks[id]) {
                  c1.checked = !!state.checks[id].c1;
                  c2.checked = !!state.checks[id].c2;
                  c3.checked = !!state.checks[id].c3;
                  saveCheck(id, false);
                }
              }

              if (document.getElementById(id)) {
                renderTimeBox(id);
                if (records[id] && records[id].out) {
                  document
                    .getElementById(id)
                    .parentElement.classList.add("normal");
                }
              }
            }
          }
        } catch (e) {
          console.error("讀取 localStorage 失敗：", e);
        }
      }

      function renderTimeBox(id) {
        if (!records[id]) {
          document.getElementById(id).innerText = "";
          return;
        }

        let lines = [];
        if (records[id].in) lines.push("簽到：" + records[id].in);
        if (records[id].out) lines.push("簽退：" + records[id].out);
        if (records[id].med) lines.push("服藥：" + records[id].med);

        document.getElementById(id).innerText = lines.join("\n");
      }

      // ⭐簽到
      function checkIn(id) {
        if (!records[id]) records[id] = {};
        records[id].in = now();
        renderTimeBox(id);
        saveToLocalStorage();
        scheduleAutoSync();
      }

      // ⭐簽退
      function checkOut(id) {
        if (!records[id]) return;

        records[id].out = now();
        renderTimeBox(id);

        document.getElementById(id).parentElement.classList.add("normal");
        saveToLocalStorage();
        scheduleAutoSync();
      }

      function takeMedicine(id) {
        if (!records[id]) records[id] = {};
        records[id].med = now();
        renderTimeBox(id);
        saveToLocalStorage();
        scheduleAutoSync();
      }

      function exportTableData() {
        let state = getStoredState();
        let visibleDays =
          currentViewMode === "today" ? [getTodayLabel()] : days;
        if (currentViewMode === "today" && !days.includes(visibleDays[0])) {
          alert("今天是週末，無課堂資料可匯出。");
          return;
        }
        let rows = [
          [
            "星期",
            "節次",
            "類型",
            "簽到",
            "簽退",
            "服藥",
            "學習完成",
            "未玩鬧",
            "遵守教師指令",
            "活動",
          ],
        ];

        for (let j = 0; j < visibleDays.length; j++) {
          let day = visibleDays[j];
          let dayIndex = days.indexOf(day);
          for (let i = 0; i < schedule.length; i++) {
            let period = schedule[i][0];
            let type = schedule[i][1];
            let key = day + "_" + period;
            let id = "c" + i + dayIndex;
            let record = records[id] || {};

            let rowType = "";
            let activity = "";
            let check1 = "";
            let check2 = "";
            let check3 = "";

            if (selfPeriods.includes(key)) {
              rowType = "抽離活動";
              let selectId = "s" + i + dayIndex;
              let selectEl = document.getElementById(selectId);
              activity =
                (selectEl ? selectEl.value : "") ||
                (state.activities && state.activities[selectId]) ||
                "";
            } else if (type == "打卡") {
              rowType = "打卡";
            } else {
              rowType = "學習檢核";
              let savedChecks = (state.checks && state.checks[id]) || {};
              let c1 = document.getElementById(id + "_1");
              let c2 = document.getElementById(id + "_2");
              let c3 = document.getElementById(id + "_3");
              check1 = c1
                ? c1.checked
                  ? "是"
                  : "否"
                : savedChecks.c1
                  ? "是"
                  : "否";
              check2 = c2
                ? c2.checked
                  ? "是"
                  : "否"
                : savedChecks.c2
                  ? "是"
                  : "否";
              check3 = c3
                ? c3.checked
                  ? "是"
                  : "否"
                : savedChecks.c3
                  ? "是"
                  : "否";
            }

            rows.push([
              i === 0 ? getDayHeaderText(day) : "",
              period,
              rowType,
              record.in || "",
              record.out || "",
              record.med || "",
              check1,
              check2,
              check3,
              activity,
            ]);
          }
        }

        let csv = rows
          .map((row) =>
            row.map((val) => `"${String(val).replace(/"/g, '""')}"`).join(","),
          )
          .join("\n");

        let blob = new Blob(["\uFEFF" + csv], {
          type: "text/csv;charset=utf-8;",
        });
        let url = URL.createObjectURL(blob);
        let a = document.createElement("a");
        a.href = url;
        a.download =
          currentViewMode === "today"
            ? `${visibleDays[0]}課表紀錄.csv`
            : "一週課表紀錄.csv";
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
      }

      function getSyncRows() {
        let state = getStoredState();
        let visibleDays =
          currentViewMode === "today" ? [getTodayLabel()] : days;
        let rows = [];

        for (let j = 0; j < visibleDays.length; j++) {
          let day = visibleDays[j];
          let dayIndex = days.indexOf(day);
          for (let i = 0; i < schedule.length; i++) {
            let period = schedule[i][0];
            let type = schedule[i][1];
            let key = day + "_" + period;
            let id = "c" + i + dayIndex;
            let record = records[id] || {};

            let rowType = "";
            let activity = "";
            let check1 = "";
            let check2 = "";
            let check3 = "";

            if (selfPeriods.includes(key)) {
              rowType = "抽離活動";
              let selectId = "s" + i + dayIndex;
              let selectEl = document.getElementById(selectId);
              activity =
                (selectEl ? selectEl.value : "") ||
                (state.activities && state.activities[selectId]) ||
                "";
            } else if (type == "打卡") {
              rowType = "打卡";
            } else {
              rowType = "學習檢核";
              let savedChecks = (state.checks && state.checks[id]) || {};
              let c1 = document.getElementById(id + "_1");
              let c2 = document.getElementById(id + "_2");
              let c3 = document.getElementById(id + "_3");
              check1 = c1
                ? c1.checked
                  ? "是"
                  : "否"
                : savedChecks.c1
                  ? "是"
                  : "否";
              check2 = c2
                ? c2.checked
                  ? "是"
                  : "否"
                : savedChecks.c2
                  ? "是"
                  : "否";
              check3 = c3
                ? c3.checked
                  ? "是"
                  : "否"
                : savedChecks.c3
                  ? "是"
                  : "否";
            }

            rows.push({
              recordId: `${getWeekStartKey()}-${day}-${period}`,
              savedAt: new Date().toISOString(),
              day: day,
              date: getDateTextForDay(day),
              period: period,
              type: rowType,
              checkIn: record.in || "",
              checkOut: record.out || "",
              medicine: record.med || "",
              check1: check1,
              check2: check2,
              check3: check3,
              activity: activity,
              viewMode: currentViewMode,
            });
          }
        }

        return rows;
      }

      async function syncToGoogleSheet(options = {}) {
        const { silent = false } = options;

        if (hasNoClassToday()) {
          setSyncStatus("error", "同步失敗");
          if (!silent) {
            alert("今天是週末，無課堂資料可同步。");
          }
          return;
        }

        if (isSyncInProgress) {
          pendingSyncAfterCurrent = true;
          return;
        }

        if (autoSyncTimerId) {
          clearTimeout(autoSyncTimerId);
          autoSyncTimerId = null;
        }

        const syncBtn = document.getElementById("btnSync");
        const originalText = syncBtn.innerText;
        isSyncInProgress = true;
        syncBtn.disabled = true;
        syncBtn.innerText = "同步中...";
        setSyncStatus("loading", "同步中");

        try {
          const rows = getSyncRows();
          const response = await fetch(GOOGLE_SHEET_WEB_APP_URL, {
            method: "POST",
            headers: { "Content-Type": "text/plain;charset=utf-8" },
            body: JSON.stringify({
              apiKey: GOOGLE_SHEET_API_KEY,
              rows,
            }),
          });

          const text = await response.text();
          let result = {};
          try {
            result = JSON.parse(text);
          } catch (e) {
            result = { ok: false, raw: text };
          }

          if (response.ok && (result.ok || result.statusCode === 200)) {
            setSyncStatus("success", "同步成功");
          } else {
            setSyncStatus("error", "同步失敗");
            if (!silent) {
              alert(
                "同步失敗：請確認 Apps Script 已部署為可匿名存取，且 doPost 可接收 rows。\n" +
                  (result.error || text || response.status),
              );
            }
          }
        } catch (error) {
          setSyncStatus("error", "同步失敗");
          if (!silent) {
            alert(
              "同步失敗：可能是 Web App 權限或 CORS 設定問題，請檢查部署權限。\n" +
                error,
            );
          }
        } finally {
          isSyncInProgress = false;
          syncBtn.innerText = originalText;
          updateSyncButtonState();
          if (pendingSyncAfterCurrent) {
            pendingSyncAfterCurrent = false;
            scheduleAutoSync();
          }
        }
      }

      // ⭐學習檢核
      function saveCheck(id, shouldSave = true) {
        let done =
          document.getElementById(id + "_1").checked &&
          document.getElementById(id + "_2").checked &&
          document.getElementById(id + "_3").checked;

        if (done) {
          document.getElementById(id).parentElement.classList.add("normal");
          document.getElementById(id).parentElement.classList.remove("warning");
        } else {
          document.getElementById(id).parentElement.classList.remove("normal");
          document.getElementById(id).parentElement.classList.add("warning");
        }

        if (shouldSave) {
          saveToLocalStorage();
          scheduleAutoSync();
        }
      }

      // ⭐活動
      function saveActivity(id) {
        document.getElementById(id).parentElement.classList.add("pullout");
        saveToLocalStorage();
        scheduleAutoSync();
      }

      function onCheckInputChange() {
        saveToLocalStorage();
        scheduleAutoSync();
      }

      function onSelectInputChange() {
        saveToLocalStorage();
        scheduleAutoSync();
      }

      // ⭐建表
      let table = document.getElementById("table");

      function renderTable() {
        let visibleDays = getVisibleDays();
        if (currentViewMode === "today" && visibleDays.length === 0) {
          table.innerHTML =
            '<tr><th>訊息</th></tr><tr><td style="padding:20px;font-size:16px;">無課堂</td></tr>';
          updateViewButtons();
          updateExportButtonState();
          updateSyncButtonState();
          return;
        }

        // 表頭
        let header = "<tr><th>節次</th>";
        visibleDays.forEach(
          (d) => (header += "<th>" + getDayHeaderText(d) + "</th>"),
        );
        header += "</tr>";

        table.innerHTML = header;

        // 內容
        for (let i = 0; i < schedule.length; i++) {
          let period = schedule[i][0];
          let type = schedule[i][1];
          let isMedicinePeriod = period == "早自習" || period == "午餐/午休";

          let row = "<tr><td>" + period + "</td>";

          for (let j = 0; j < visibleDays.length; j++) {
            let day = visibleDays[j];
            let dayIndex = days.indexOf(day);
            let key = day + "_" + period;
            let id = "c" + i + dayIndex;

            let cellClass = "normal";

            // ⭐抽離判斷
            if (selfPeriods.includes(key)) {
              cellClass = "pullout";
              row += `<td class="${cellClass}">
<select id="s${i}${dayIndex}" onchange="onSelectInputChange()">
<option value="">選擇</option>
<option>寫評量</option>
<option>織圍巾</option>
<option>晤談</option>
<option>放空</option>
</select>
<button onclick="saveActivity('s${i}${dayIndex}')">✔</button>
</td>`;
            } else if (type == "打卡") {
              let medicineButton = isMedicinePeriod
                ? `<button class="med" onclick="takeMedicine('${id}')">服藥</button>`
                : "";
              row += `<td class="${cellClass} time-box">
<div id="${id}"></div>
<div class="time-actions">
<button class="in" onclick="checkIn('${id}')">簽到</button>
<button class="out" onclick="checkOut('${id}')">簽退</button>
${medicineButton}
</div>
</td>`;
            } else {
              row += `<td class="${cellClass}">
<input type="checkbox" id="${id}_1" onchange="onCheckInputChange()">完成課堂學習活動<br>
<input type="checkbox" id="${id}_2" onchange="onCheckInputChange()">未與同學玩鬧<br>
<input type="checkbox" id="${id}_3" onchange="onCheckInputChange()">遵守教師指令<br>
<button onclick="saveCheck('${id}')">✔</button>
</td>`;
            }
          }

          row += "</tr>";
          table.innerHTML += row;
        }

        updateViewButtons();
        updateExportButtonState();
        updateSyncButtonState();
        loadFromLocalStorage();
      }

      const savedViewMode = localStorage.getItem(VIEW_MODE_KEY);
      if (savedViewMode === "today" || savedViewMode === "week") {
        currentViewMode = savedViewMode;
      }
      const savedApiKey = localStorage.getItem(
        GOOGLE_SHEET_API_KEY_STORAGE_KEY,
      );
      if (savedApiKey !== null) {
        GOOGLE_SHEET_API_KEY = savedApiKey;
      }

      renderTable();
    </script>
  </body>
</html>
